<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Gradient for the pads -->
        <linearGradient id="padGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#FF4500;stop-opacity:1" />
        </linearGradient>
        
        <!-- Gradient for the chain link -->
        <linearGradient id="linkGradient" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0.9" />
        </linearGradient>

        <!-- Background glow -->
        <radialGradient id="glowGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:0.2" />
            <stop offset="100%" style="stop-color:#1E90FF;stop-opacity:0.1" />
        </radialGradient>
        
        <!-- Filter for soft shadows -->
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="15" />
            <feOffset dx="0" dy="10" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.3" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Background Glow -->
    <circle cx="512" cy="512" r="450" fill="url(#glowGradient)" />

    <g filter="url(#shadow)">
        <!-- Toe Pads -->
        <ellipse cx="250" cy="350" rx="60" ry="85" fill="url(#padGradient)" transform="rotate(-15, 250, 350)" />
        <ellipse cx="420" cy="280" rx="65" ry="95" fill="url(#padGradient)" />
        <ellipse cx="604" cy="280" rx="65" ry="95" fill="url(#padGradient)" />
        <ellipse cx="774" cy="350" rx="60" ry="85" fill="url(#padGradient)" transform="rotate(15, 774, 350)" />

        <!-- Main Pad (The "Paw" base) -->
        <path d="M512 450 
                 C 700 450, 850 550, 850 720 
                 C 850 880, 700 950, 512 950 
                 C 324 950, 174 880, 174 720 
                 C 174 550, 324 450, 512 450 Z" 
              fill="url(#padGradient)" />

        <!-- Chain Link (Tallened, Aspect Maintained, and Stretched 20%) -->
        <!-- Total Width: 450, Total Height: 100. Centered at X=(1024-450)/2 = 287 -->
        <g transform="translate(287, 620)">
            <!-- Left Link (Width 300, Height 100) -->
            <rect x="0" y="0" width="300" height="100" rx="50" stroke="url(#linkGradient)" stroke-width="30" fill="none" />
            <!-- Right Link (Offset by 150) -->
            <rect x="150" y="0" width="300" height="100" rx="50" stroke="url(#linkGradient)" stroke-width="30" fill="none" />
        </g>
    </g>
</svg>
